<VirtualHost *:443>
    ServerName localhost
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/localhost.pem
    SSLCertificateKeyFile /etc/ssl/certs/localhost-key.pem

    <Directory /var/www/html>
        RewriteEngine On

        RewriteRule ^(.*)$ public/$1 [QSA,L]
    </Directory>

    # alpha PWA: /js/alpha/sw.js が /alpha スコープを主張できるよう許可
    # （RewriteRule で public/ に解決されるため、実ファイルパスでヘッダを付与する）
    <Directory "/var/www/html/public/js/alpha">
        <Files "sw.js">
            Header always set Service-Worker-Allowed "/"
        </Files>
    </Directory>
</VirtualHost>
