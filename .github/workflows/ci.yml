name: CI Test

on:
  pull_request:
    branches:
      - main
      - stg
  workflow_dispatch:

# 一時的な検証用: デプロイ後スモークのSSH実行だけを回す（検証後に元へ戻す）
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          STG_SSH_KEY: ${{ secrets.STG_SSH_PRIVATE_KEY }}
          STG_KNOWN_HOSTS: ${{ secrets.STG_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          echo "$STG_SSH_KEY" > ~/.ssh/id_rsa_stg
          chmod 600 ~/.ssh/id_rsa ~/.ssh/id_rsa_stg
          echo "$KNOWN_HOSTS" >> ~/.ssh/known_hosts
          echo "$STG_KNOWN_HOSTS" >> ~/.ssh/known_hosts

      - name: Smoke via SSH (prod相当)
        run: |
          ssh -p ${{ vars.SSH_PORT }} ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
            "cd ${{ vars.SSH_PATH }} && SITE_URL=https://openchat-review.me IS_STG=false bash .github/scripts/post-deploy-smoke.sh"

      - name: Smoke via SSH (stg相当)
        run: |
          ssh -i ~/.ssh/id_rsa_stg -p ${{ vars.STG_SSH_PORT }} ${{ vars.STG_SSH_USER }}@${{ vars.STG_SSH_HOST }} \
            "cd ${{ vars.STG_SSH_PATH }} && SITE_URL=https://openchat-review-dev.me IS_STG=true bash .github/scripts/post-deploy-smoke.sh"
